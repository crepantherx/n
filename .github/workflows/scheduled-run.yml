name: Scheduled Job Automation Worker

on:
  workflow_dispatch:
    inputs:
      tasks:
        description: "Comma-separated tasks: naukri,linkedin,bot,intl_linkedin,intl_indeed,intl_reed,intl_crawler,lead_scraper"
        required: false
        default: "naukri"
      target:
        description: "Applications/leads target per run"
        required: false
        default: "30"
  schedule:
    # GitHub cron is UTC. Change this without touching local macOS/Windows schedules.
    - cron: "0 6 * * *"

jobs:
  run-automation:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      RUN_TASKS: ${{ github.event.inputs.tasks || secrets.RUN_TASKS || 'naukri' }}
      RUN_TARGET: ${{ github.event.inputs.target || secrets.RUN_TARGET || '30' }}
      NAUKRI_EMAIL: ${{ secrets.NAUKRI_EMAIL }}
      NAUKRI_PASSWORD: ${{ secrets.NAUKRI_PASSWORD }}
      LINKEDIN_EMAIL: ${{ secrets.LINKEDIN_EMAIL }}
      LINKEDIN_PASSWORD: ${{ secrets.LINKEDIN_PASSWORD }}
      LINKEDIN_PHONE: ${{ secrets.LINKEDIN_PHONE }}
      REED_EMAIL: ${{ secrets.REED_EMAIL }}
      REED_PASSWORD: ${{ secrets.REED_PASSWORD }}
      CTC_INR: ${{ secrets.CTC_INR }}
      JOB_TITLES: ${{ secrets.JOB_TITLES }}
      RESUME_BASE64: ${{ secrets.RESUME_BASE64 }}
      RESUME_FILENAME: ${{ secrets.RESUME_FILENAME }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m playwright install --with-deps chromium
      - name: Run selected automation tasks
        run: python scripts/cloud_schedule_runner.py
